<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>מסע הגיבורים שלי</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&family=Bungee&family=Frank+Ruhl+Libre:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Splash / Home Screen - Treasure Map -->
        <div id="screen-home" class="screen active">
            <div class="map-container">
                <!-- Map title banner -->
                <div class="map-banner">
                    <h1 class="map-title">מסע הגיבורים של גיא</h1>
                    <div class="map-xp">
                        <div class="map-xp-bar"><div class="map-xp-fill" id="home-xp-fill"></div></div>
                        <span class="map-xp-text" id="home-xp-text">0 / 1000 XP</span>
                    </div>
                </div>
                <!-- SVG path layer -->
                <svg class="map-path-svg" id="map-path-svg" preserveAspectRatio="none">
                    <defs>
                        <filter id="pathGlow">
                            <feGaussianBlur stdDeviation="3" result="blur"/>
                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                    </defs>
                </svg>
                <!-- Quest nodes layer -->
                <div class="quest-map" id="quest-map">
                    <!-- Quest landmarks rendered by JS -->
                </div>
                <!-- Brainrot characters - actual images scattered across the map -->
                <div id="brainrot-container">
                    <!-- Populated by JS from BRAINROT_CHARS array -->
                </div>
            </div>
        </div>

        <!-- Quest Screen (dynamic) -->
        <div id="screen-quest" class="screen">
            <header class="quest-header">
                <button class="btn-back" onclick="showHome()">→ חזרה</button>
                <div class="quest-badge" id="quest-badge"></div>
                <h2 class="quest-title" id="quest-title"></h2>
            </header>
            <div class="quest-body" id="quest-body">
                <!-- Quest content rendered dynamically -->
            </div>
            <div class="quest-footer">
                <button class="btn-complete" id="btn-complete" onclick="completeQuest()">סיימתי את המשימה! ✓</button>
            </div>
        </div>

        <!-- Hero Book Screen -->
        <div id="screen-book" class="screen">
            <header class="book-header">
                <button class="btn-back" onclick="showHome()">→ חזרה</button>
                <h2>ספר הגיבור שלי</h2>
            </header>
            <div class="book-body" id="book-body">
                <!-- Generated from completed quests -->
            </div>
            <div class="book-footer">
                <button class="btn-export" onclick="exportPDF()">📄 ייצוא לPDF</button>
                <button class="btn-export" onclick="exportPresentation()">🎬 צפייה במצגת</button>
            </div>
        </div>
    </div>

    <script src="quests.js?v=9"></script>
    <script src="app.js?v=9"></script>
</body>
</html>
